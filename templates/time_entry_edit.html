{% extends "base.html" %}
{% block title %}Edit Entry | Project Time Tracker{% endblock %}
{% block content %}
<section class="panel max-w-3xl">
    <div class="mb-6 flex items-center justify-between gap-3">
        <h2 class="text-xl font-semibold tracking-tight">Edit Time Entry</h2>
        <div class="flex flex-wrap gap-3">
            <form method="post" action="/entries/{{ entry.id }}/delete">
                <input type="hidden" name="next_path" value="/entries?status=all">
                <button type="submit" class="btn-secondary">Delete</button>
            </form>
            <a href="/entries" hx-boost="false" class="btn-secondary">Back to entries</a>
        </div>
    </div>
    <form method="post" action="/entries/{{ entry.id }}/edit" class="grid gap-4 md:grid-cols-2 entry-form" data-entry-form>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300">
            Client
            <select data-client-select class="field">
                <option value="">Select client</option>
                {% for client in clients %}
                    <option value="{{ client.id }}" {% if client.id == entry.project.client_id %}selected{% endif %}>{{ client.name }}</option>
                {% endfor %}
            </select>
        </label>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300">
            Project
            <select name="project_id" required data-project-select class="field">
                <option value="">Select project</option>
                {% for project in projects %}
                    <option value="{{ project.id }}" data-client-id="{{ project.client_id }}" {% if project.id == entry.project_id %}selected{% endif %}>{{ project.name }}</option>
                {% endfor %}
            </select>
        </label>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300">
            Task
            <select name="task_id" required data-task-select class="field">
                <option value="">Select task</option>
                {% for task in tasks %}
                    <option value="{{ task.id }}" data-project-id="{{ task.project_id }}" {% if task.id == entry.task_id %}selected{% endif %}>{{ task.name }}</option>
                {% endfor %}
            </select>
        </label>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300">
            Start Time
            <input type="datetime-local" step="1" name="start_time" value="{{ datetime_input_value(entry.start_time) }}" required class="field">
        </label>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300">
            End Time
            <input type="datetime-local" step="1" name="end_time" value="{{ datetime_input_value(entry.end_time) }}" class="field">
        </label>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 md:col-span-2">
            Notes
            <textarea name="notes" rows="4" class="field">{{ entry.notes or "" }}</textarea>
        </label>
        <div class="md:col-span-2">
            <button type="submit" class="btn">Save Changes</button>
        </div>
    </form>
</section>
{% endblock %}
